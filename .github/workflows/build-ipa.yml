name: Build BLERemotePad IPA
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.swift"
      - "Info.plist"
      - "project.yml"
      - ".github/workflows/build-ipa.yml"
jobs:
  justbuilditdiwaaisus:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Select Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: build
        run: |
          set -eo pipefail
          xcodebuild \
            -project BLERemotePad.xcodeproj \
            -scheme BLERemotePad \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean build
      - name: verify
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/BLERemotePad.app"
          INFO_PLIST="$APP_PATH/Info.plist"    
          echo "Checking Info.plist at: $INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSBluetoothAlwaysUsageDescription" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSBluetoothPeripheralUsageDescription" "$INFO_PLIST"
      - name: package IPA and TIPA
        run: |
          set -eo pipefail

          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found under build/Build/Products/Release-iphoneos"
            exit 1
          fi

          INFO_PLIST="$APP_PATH/Info.plist"
          if [ ! -f "$INFO_PLIST" ]; then
            echo "Missing Info.plist at $INFO_PLIST"
            exit 1
          fi

          rm -rf build/Payload
          mkdir -p build/Payload
          APP_NAME="$(basename "$APP_PATH")"
          /usr/bin/ditto "$APP_PATH" "build/Payload/$APP_NAME"

          cd build
          /usr/bin/zip -qry BLERemotePad.ipa Payload
          /usr/bin/zip -qry BLERemotePad.tipa Payload

          echo "Verifying package payload structure..."
          /usr/bin/unzip -l BLERemotePad.ipa | /usr/bin/grep -E 'Payload/[^/]+\.app/Info\.plist$'
          /usr/bin/unzip -l BLERemotePad.tipa | /usr/bin/grep -E 'Payload/[^/]+\.app/Info\.plist$'
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLERemotePad-Latest
          path: |
            build/BLERemotePad.ipa
            build/BLERemotePad.tipa
          retention-days: 7
